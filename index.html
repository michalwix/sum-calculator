<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σ Electromatic — Sum Machine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design Tokens ───────────────────────────────────── */
    :root {
      --body-bg:       #1A120A;
      --machine-top:   #1E3526;
      --machine-mid:   #1A2E20;
      --machine-bot:   #162818;
      --machine-shine: rgba(255,255,255,0.06);
      --machine-rim:   #2E5040;
      --machine-screw: #3A5A46;
      --led-bg:        #040E06;
      --led-green:     #7DFF6A;
      --led-glow:      rgba(125,255,106,0.45);
      --led-dim:       rgba(125,255,106,0.12);
      --key-face-hi:   #D4CDB8;
      --key-face-lo:   #B8B0A0;
      --key-shadow:    #7A7368;
      --key-text:      #22180C;
      --key-add-hi:    #3E7048;
      --key-add-lo:    #2E5838;
      --key-add-sh:    #1A3020;
      --key-add-txt:   #B8F0C0;
      --key-tot-hi:    #285A38;
      --key-tot-lo:    #1E4828;
      --key-tot-sh:    #0E2818;
      --key-tot-txt:   #90EBA0;
      --key-del-hi:    #A03030;
      --key-del-lo:    #802828;
      --key-del-sh:    #501818;
      --key-del-txt:   #FFD0D0;
      --key-clr-hi:    #48403A;
      --key-clr-lo:    #38302A;
      --key-clr-sh:    #201A16;
      --key-clr-txt:   #C0B8A8;
      --paper:         #F7F1E3;
      --paper-line:    #EDE6D2;
      --paper-edge:    #DDD5C0;
      --ink:           #140C04;
      --ink-faded:     #7A6848;
      --ink-red:       #C0281E;
      --sprocket:      #D8D0BC;
      --tape-width:    300px;
    }

    /* ─── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--body-bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%, #2A1E10 0%, transparent 70%),
        repeating-linear-gradient(93deg, transparent 0px, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      font-family: 'Courier Prime', monospace;
      user-select: none;
    }

    /* ─── Page Title ──────────────────────────────────────── */
    .page-title {
      font-family: 'Special Elite', cursive;
      font-size: 11px;
      letter-spacing: 6px;
      color: #4A6050;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ─── Machine Body ────────────────────────────────────── */
    .machine {
      width: var(--tape-width);
      background: linear-gradient(175deg, var(--machine-top) 0%, var(--machine-mid) 55%, var(--machine-bot) 100%);
      border-radius: 14px 14px 0 0;
      padding: 0;
      box-shadow:
        0 0 0 1px var(--machine-rim),
        0 -3px 0 0 #3A6050,
        0 12px 40px rgba(0,0,0,0.7),
        inset 0 1px 0 var(--machine-shine),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    /* subtle brushed metal sheen */
    .machine::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 1px,
        rgba(255,255,255,0.018) 1px, rgba(255,255,255,0.018) 2px
      );
      pointer-events: none;
      border-radius: inherit;
    }

    /* ─── Machine Header ──────────────────────────────────── */
    .machine-header {
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .screw {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #5A7A60, #2A4030);
      box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      position: relative;
    }
    .screw::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 15%;
      right: 15%;
      height: 1.5px;
      background: rgba(0,0,0,0.5);
      transform: translateY(-50%) rotate(45deg);
      border-radius: 1px;
    }

    .machine-name {
      font-family: 'Special Elite', cursive;
      font-size: 10px;
      letter-spacing: 4px;
      color: #5A8A6A;
      text-transform: uppercase;
      text-align: center;
    }
    .machine-name span {
      display: block;
      font-size: 7px;
      letter-spacing: 3px;
      color: #3A5A46;
      margin-top: 2px;
    }

    /* ─── LED Display ─────────────────────────────────────── */
    .display-wrap {
      padding: 12px 20px 10px;
    }

    .display {
      background: var(--led-bg);
      border: 1px solid rgba(125,255,106,0.15);
      border-radius: 6px;
      padding: 10px 16px 10px;
      box-shadow:
        inset 0 2px 12px rgba(0,0,0,0.9),
        inset 0 0 30px rgba(0,0,0,0.7),
        0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      min-height: 56px;
      position: relative;
    }

    /* ghost "8888888" segments */
    .display::before {
      content: '888888888888';
      position: absolute;
      right: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      color: var(--led-dim);
      letter-spacing: 2px;
      pointer-events: none;
    }

    .display-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      color: var(--led-green);
      text-shadow: 0 0 8px var(--led-glow), 0 0 20px rgba(125,255,106,0.2);
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
      transition: color 0.15s;
    }

    .display-value.flash {
      color: #FFFFFF;
      text-shadow: 0 0 12px rgba(255,255,255,0.9);
    }

    .display-label {
      position: absolute;
      left: 12px;
      top: 8px;
      font-size: 8px;
      letter-spacing: 3px;
      color: #2A4A30;
      font-family: 'Special Elite', cursive;
      text-transform: uppercase;
    }

    /* blinking cursor when idle */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 26px;
      background: var(--led-green);
      box-shadow: 0 0 6px var(--led-glow);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
      position: relative;
      z-index: 1;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── Keypad ──────────────────────────────────────────── */
    .keypad-wrap {
      padding: 10px 20px 16px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    /* Base key style */
    .key {
      padding: 0;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Courier Prime', monospace;
      font-size: 17px;
      font-weight: 700;
      color: var(--key-text);
      background: linear-gradient(180deg, var(--key-face-hi) 0%, var(--key-face-lo) 100%);
      box-shadow:
        0 4px 0 var(--key-shadow),
        0 5px 8px rgba(0,0,0,0.4);
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.07s ease, box-shadow 0.07s ease;
      position: relative;
      overflow: hidden;
    }

    .key::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
      border-radius: 5px 5px 0 0;
      pointer-events: none;
    }

    .key:active, .key.pressed {
      transform: translateY(3px);
      box-shadow:
        0 1px 0 var(--key-shadow),
        0 1px 3px rgba(0,0,0,0.3);
    }

    /* Add key — green */
    .key-add {
      color: var(--key-add-txt);
      background: linear-gradient(180deg, var(--key-add-hi) 0%, var(--key-add-lo) 100%);
      box-shadow: 0 4px 0 var(--key-add-sh), 0 5px 8px rgba(0,0,0,0.4);
      font-size: 22px;
    }
    .key-add:active, .key-add.pressed {
      box-shadow: 0 1px 0 var(--key-add-sh), 0 1px 3px rgba(0,0,0,0.3);
    }

    /* Delete key — red */
    .key-del {
      color: var(--key-del-txt);
      background: linear-gradient(180deg, var(--key-del-hi) 0%, var(--key-del-lo) 100%);
      box-shadow: 0 4px 0 var(--key-del-sh), 0 5px 8px rgba(0,0,0,0.4);
      font-size: 14px;
    }
    .key-del:active, .key-del.pressed {
      box-shadow: 0 1px 0 var(--key-del-sh), 0 1px 3px rgba(0,0,0,0.3);
    }

    /* Total key — full width, dark green */
    .key-total {
      grid-column: 1 / 4;
      height: 44px;
      color: var(--key-tot-txt);
      background: linear-gradient(180deg, var(--key-tot-hi) 0%, var(--key-tot-lo) 100%);
      box-shadow: 0 4px 0 var(--key-tot-sh), 0 5px 8px rgba(0,0,0,0.4);
      font-family: 'Special Elite', cursive;
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .key-total:active, .key-total.pressed {
      box-shadow: 0 1px 0 var(--key-tot-sh), 0 1px 3px rgba(0,0,0,0.3);
    }

    /* Clear key — dark muted */
    .key-clear {
      grid-column: 1 / 4;
      height: 36px;
      color: var(--key-clr-txt);
      background: linear-gradient(180deg, var(--key-clr-hi) 0%, var(--key-clr-lo) 100%);
      box-shadow: 0 3px 0 var(--key-clr-sh), 0 4px 6px rgba(0,0,0,0.3);
      font-family: 'Special Elite', cursive;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .key-clear:active, .key-clear.pressed {
      box-shadow: 0 1px 0 var(--key-clr-sh), 0 1px 3px rgba(0,0,0,0.3);
    }

    /* ─── Paper feed slot ─────────────────────────────────── */
    .feed-slot {
      height: 8px;
      background: #0A1A0E;
      border-top: 1px solid rgba(0,0,0,0.5);
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.8);
      position: relative;
    }
    .feed-slot::before,
    .feed-slot::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0E2018;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
    }
    .feed-slot::before { left: 12px; }
    .feed-slot::after  { right: 12px; }

    /* ─── Tape ────────────────────────────────────────────── */
    .tape-outer {
      width: var(--tape-width);
      position: relative;
    }

    /* Sprocket margin strips */
    .tape-strip {
      background: var(--paper);
      border-left:  1px solid var(--paper-edge);
      border-right: 1px solid var(--paper-edge);
      display: flex;
      position: relative;
    }

    .sprocket-col {
      width: 22px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 20px;
      background: var(--paper-line);
    }

    .sprocket-hole {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--body-bg);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    /* Main tape content */
    .tape-content {
      flex: 1;
      padding: 12px 8px 12px 4px;
      min-height: 160px;
      max-height: 380px;
      overflow-y: auto;
      scroll-behavior: smooth;
      /* Hide scrollbar but keep functionality */
      scrollbar-width: none;
    }
    .tape-content::-webkit-scrollbar { display: none; }

    /* Subtle horizontal ruled lines */
    .tape-content {
      background-image: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 25px,
        var(--paper-line) 25px, var(--paper-line) 26px
      );
      background-position: 0 6px;
    }

    /* Empty state */
    .tape-empty {
      text-align: center;
      padding: 32px 0;
      font-family: 'Special Elite', cursive;
      font-size: 11px;
      letter-spacing: 3px;
      color: #C0B4A0;
    }

    /* Each number entry */
    .tape-entry {
      display: flex;
      align-items: baseline;
      line-height: 26px;
      animation: slideDown 0.18s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-op {
      font-size: 13px;
      color: var(--ink-faded);
      width: 18px;
      flex-shrink: 0;
    }

    .entry-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      color: var(--ink);
      text-align: right;
      flex: 1;
      letter-spacing: 0.5px;
    }

    /* Divider before total */
    .tape-divider {
      height: 1px;
      background: var(--ink);
      margin: 3px 0;
      border: none;
    }

    /* Grand total row */
    .tape-total-row {
      display: flex;
      align-items: baseline;
      line-height: 30px;
      border-bottom: 3px double var(--ink-red);
      margin-bottom: 6px;
      padding-bottom: 2px;
      animation: totalReveal 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes totalReveal {
      from { opacity: 0; transform: scaleX(0.95); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    .total-label {
      font-family: 'Special Elite', cursive;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--ink-red);
      flex: 1;
    }

    .total-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink-red);
      letter-spacing: 1px;
    }

    /* Running subtotal hint */
    .tape-running {
      display: flex;
      align-items: baseline;
      line-height: 22px;
      opacity: 0.5;
    }
    .running-label {
      font-family: 'Special Elite', cursive;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--ink-faded);
      flex: 1;
    }
    .running-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--ink-faded);
    }

    /* ─── Tape bottom curl ────────────────────────────────── */
    .tape-curl {
      width: var(--tape-width);
      height: 28px;
      background: var(--paper);
      border-left:  1px solid var(--paper-edge);
      border-right: 1px solid var(--paper-edge);
      border-bottom: 1px solid var(--paper-edge);
      border-radius: 0 0 2px 2px;
      box-shadow:
        0 12px 20px rgba(0,0,0,0.4),
        0 4px 6px rgba(0,0,0,0.25);
      position: relative;
    }
    .tape-curl::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 10%;
      right: 10%;
      height: 18px;
      background: var(--paper);
      border-radius: 0 0 40% 40%;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      transform: rotate(-0.8deg);
    }

    /* ─── Keyboard hint ───────────────────────────────────── */
    .kb-hint {
      margin-top: 36px;
      font-family: 'Special Elite', cursive;
      font-size: 9px;
      letter-spacing: 3px;
      color: #2A3E30;
      text-align: center;
      text-transform: uppercase;
    }

    /* ─── Misc Utilities ──────────────────────────────────── */
    button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>

  <p class="page-title">Electromatic Adding Machine</p>

  <!-- ═══ MACHINE BODY ═══════════════════════════════ -->
  <div class="machine" role="application" aria-label="Sum calculator">

    <!-- Header screws + name plate -->
    <div class="machine-header">
      <div class="screw" aria-hidden="true"></div>
      <div class="machine-name">
        Σ&nbsp;&nbsp;Sum&nbsp;&nbsp;Only
        <span>Model No. 1 — Est. 2026</span>
      </div>
      <div class="screw" aria-hidden="true"></div>
    </div>

    <!-- LED Display -->
    <div class="display-wrap">
      <div class="display" role="status" aria-live="polite" aria-label="Current input">
        <span class="display-label">INPUT</span>
        <span class="display-value" id="display-value">0</span>
        <span class="cursor" id="cursor" aria-hidden="true"></span>
      </div>
    </div>

    <!-- Keypad -->
    <div class="keypad-wrap">
      <div class="keypad">
        <!-- Row 1 -->
        <button class="key" data-key="7"  aria-label="7"  onclick="pressDigit('7')">7</button>
        <button class="key" data-key="8"  aria-label="8"  onclick="pressDigit('8')">8</button>
        <button class="key" data-key="9"  aria-label="9"  onclick="pressDigit('9')">9</button>
        <!-- Row 2 -->
        <button class="key" data-key="4"  aria-label="4"  onclick="pressDigit('4')">4</button>
        <button class="key" data-key="5"  aria-label="5"  onclick="pressDigit('5')">5</button>
        <button class="key" data-key="6"  aria-label="6"  onclick="pressDigit('6')">6</button>
        <!-- Row 3 -->
        <button class="key" data-key="1"  aria-label="1"  onclick="pressDigit('1')">1</button>
        <button class="key" data-key="2"  aria-label="2"  onclick="pressDigit('2')">2</button>
        <button class="key" data-key="3"  aria-label="3"  onclick="pressDigit('3')">3</button>
        <!-- Row 4 -->
        <button class="key" data-key="."  aria-label="decimal point" onclick="pressDigit('.')">.</button>
        <button class="key" data-key="0"  aria-label="0"  onclick="pressDigit('0')">0</button>
        <button class="key key-del"       aria-label="backspace"     onclick="pressBackspace()">⌫</button>
        <!-- Add -->
        <button class="key key-add"       aria-label="add to sum"    onclick="pressAdd()">+</button>
        <!-- Row 5 — Total -->
        <button class="key key-total"     aria-label="show total"    onclick="pressTotal()">TOTAL&nbsp;&nbsp;&nbsp;═══</button>
        <!-- Clear -->
        <button class="key key-clear"     aria-label="clear all"     onclick="pressClear()">✕&nbsp;&nbsp;CLEAR ALL</button>
      </div>
    </div>

    <!-- Paper feed slot -->
    <div class="feed-slot" aria-hidden="true"></div>
  </div>

  <!-- ═══ RECEIPT TAPE ════════════════════════════════ -->
  <div class="tape-outer" aria-label="Receipt tape">
    <div class="tape-strip">

      <!-- Left sprocket column -->
      <div class="sprocket-col" id="left-sprockets" aria-hidden="true">
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
      </div>

      <!-- Tape content -->
      <div class="tape-content" id="tape" role="log" aria-label="Number entries">
        <div class="tape-empty" id="tape-empty">— enter a number above —</div>
      </div>

      <!-- Right sprocket column -->
      <div class="sprocket-col" id="right-sprockets" aria-hidden="true">
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
        <div class="sprocket-hole"></div>
      </div>

    </div>
    <div class="tape-curl" aria-hidden="true"></div>
  </div>

  <p class="kb-hint">keyboard: digits · + or Enter to add · = for total · Esc to clear</p>

  <!-- ═══ AUDIO (Web Audio API — subtle key click) ═══ -->
  <!-- ═══ JAVASCRIPT ═══════════════════════════════════ -->
  <script>
    /* ─── State ─────────────────────────────────────── */
    let input     = '0';
    let numbers   = [];        // list of { value: number, label: string }
    let hasDecimal = false;
    let justTotal  = false;    // after pressing Total, next digit starts fresh
    const MAX_DIGITS = 12;

    /* ─── Audio ─────────────────────────────────────── */
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function click(freq = 900, dur = 0.04, vol = 0.15) {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'square';
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + dur);
      } catch(e) {}
    }

    /* ─── Display ────────────────────────────────────── */
    const displayEl = document.getElementById('display-value');
    const cursorEl  = document.getElementById('cursor');

    function setDisplay(val, hideCursor = false) {
      displayEl.textContent = val;
      cursorEl.style.display = hideCursor ? 'none' : '';
    }

    function flashDisplay(val) {
      displayEl.classList.add('flash');
      setDisplay(val, true);
      setTimeout(() => {
        displayEl.classList.remove('flash');
        cursorEl.style.display = '';
      }, 300);
    }

    /* ─── Format helpers ─────────────────────────────── */
    function formatTape(n) {
      // Up to 2 decimal places, no trailing zeros, max 12 chars
      let s = parseFloat(n.toFixed(6)).toString();
      // Compact: remove unnecessary trailing decimal zeros
      if (s.includes('.')) s = s.replace(/\.?0+$/, '');
      return s;
    }
    function formatTotal(n) {
      // Always show 2 decimal places for totals
      return parseFloat(n.toFixed(6))
        .toFixed(2)
        .replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    /* ─── Key Press — Digit / Decimal ───────────────── */
    function pressDigit(d) {
      click(1100 + Math.random() * 200, 0.035, 0.12);
      animateKey(`[data-key="${d}"]`);

      if (justTotal) {
        // Start fresh number after Total was shown
        input = (d === '.') ? '0.' : d;
        hasDecimal = (d === '.');
        justTotal = false;
        setDisplay(input);
        return;
      }

      if (d === '.') {
        if (hasDecimal) return;
        hasDecimal = true;
        input = input === '0' ? '0.' : input + '.';
      } else {
        if (input === '0') {
          input = d;
        } else {
          if (input.replace('.', '').replace('-', '').length >= MAX_DIGITS) return;
          input += d;
        }
      }
      setDisplay(input);
    }

    /* ─── Key Press — Backspace ──────────────────────── */
    function pressBackspace() {
      click(700, 0.04, 0.1);
      animateKey('[data-key="."]', '.key-del');

      if (justTotal) { justTotal = false; return; }

      if (input.length <= 1) {
        input = '0';
        hasDecimal = false;
      } else {
        if (input.slice(-1) === '.') hasDecimal = false;
        input = input.slice(0, -1);
      }
      setDisplay(input);
    }

    /* ─── Key Press — Add (+) ────────────────────────── */
    function pressAdd() {
      click(800, 0.06, 0.18);
      animateKey(null, '.key-add');

      if (justTotal) justTotal = false;

      const val = parseFloat(input);
      if (isNaN(val)) return;

      numbers.push(val);
      addTapeEntry(val);

      input = '0';
      hasDecimal = false;
      setDisplay('0');
      updateRunning();
    }

    /* ─── Key Press — Total ──────────────────────────── */
    function pressTotal() {
      click(600, 0.12, 0.2);
      animateKey(null, '.key-total');

      // If there's a pending number in display, add it first
      const val = parseFloat(input);
      if (!isNaN(val) && val !== 0 && !justTotal) {
        numbers.push(val);
        addTapeEntry(val);
      }

      if (numbers.length === 0) {
        flashDisplay('---');
        return;
      }

      const total = numbers.reduce((a, b) => a + b, 0);
      addTapeTotal(total);

      input = formatTotal(total).replace(/,/g, '');
      flashDisplay(formatTotal(total), true);
      justTotal = true;
    }

    /* ─── Key Press — Clear ──────────────────────────── */
    function pressClear() {
      click(500, 0.15, 0.15);
      animateKey(null, '.key-clear');

      numbers = [];
      input = '0';
      hasDecimal = false;
      justTotal = false;
      setDisplay('0');

      const tape = document.getElementById('tape');
      tape.innerHTML = '<div class="tape-empty" id="tape-empty">— enter a number above —</div>';
      syncSprockets();
    }

    /* ─── Tape — Add Entry ───────────────────────────── */
    function addTapeEntry(val) {
      removeTapeEmpty();
      removeRunningRow();

      const tape = document.getElementById('tape');
      const row = document.createElement('div');
      row.className = 'tape-entry';
      row.innerHTML = `
        <span class="entry-op">+</span>
        <span class="entry-num">${formatTape(val)}</span>
      `;
      tape.appendChild(row);
      tape.scrollTop = tape.scrollHeight;
      syncSprockets();
    }

    /* ─── Tape — Running Subtotal ────────────────────── */
    function updateRunning() {
      removeRunningRow();
      if (numbers.length < 2) return;
      const sub = numbers.reduce((a,b) => a+b, 0);
      const tape = document.getElementById('tape');
      const row = document.createElement('div');
      row.className = 'tape-running';
      row.id = 'running-row';
      row.innerHTML = `
        <span class="running-label">subtotal</span>
        <span class="running-value">${formatTotal(sub)}</span>
      `;
      tape.appendChild(row);
      tape.scrollTop = tape.scrollHeight;
    }

    function removeRunningRow() {
      const r = document.getElementById('running-row');
      if (r) r.remove();
    }

    /* ─── Tape — Grand Total ─────────────────────────── */
    function addTapeTotal(total) {
      removeRunningRow();
      const tape = document.getElementById('tape');

      const div = document.createElement('hr');
      div.className = 'tape-divider';
      tape.appendChild(div);

      const row = document.createElement('div');
      row.className = 'tape-total-row';
      row.setAttribute('aria-label', `Total: ${formatTotal(total)}`);
      row.innerHTML = `
        <span class="total-label">TOTAL</span>
        <span class="total-value">${formatTotal(total)}</span>
      `;
      tape.appendChild(row);

      // Section break (blank visual gap)
      const gap = document.createElement('div');
      gap.style.height = '14px';
      tape.appendChild(gap);

      tape.scrollTop = tape.scrollHeight;
      syncSprockets();
    }

    /* ─── Helpers ────────────────────────────────────── */
    function removeTapeEmpty() {
      const el = document.getElementById('tape-empty');
      if (el) el.remove();
    }

    function syncSprockets() {
      // Make sure enough sprocket holes exist in both columns
      const tape = document.getElementById('tape');
      const height = tape.scrollHeight;
      const holes = Math.max(6, Math.ceil(height / 26) + 2);

      ['left-sprockets', 'right-sprockets'].forEach(id => {
        const col = document.getElementById(id);
        col.innerHTML = '';
        for (let i = 0; i < holes; i++) {
          const h = document.createElement('div');
          h.className = 'sprocket-hole';
          col.appendChild(h);
        }
      });
    }

    function animateKey(selector, fallback) {
      const el = selector
        ? document.querySelector(selector)
        : (fallback ? document.querySelector(fallback) : null);
      if (!el) return;
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 120);
    }

    /* ─── Keyboard Support ───────────────────────────── */
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const k = e.key;

      if ((k >= '0' && k <= '9') || k === '.') {
        e.preventDefault();
        pressDigit(k);
      } else if (k === 'Backspace') {
        e.preventDefault();
        pressBackspace();
      } else if (k === '+' || k === 'Enter') {
        e.preventDefault();
        pressAdd();
      } else if (k === '=' ) {
        e.preventDefault();
        pressTotal();
      } else if (k === 'Escape') {
        e.preventDefault();
        pressClear();
      }
    });

    /* ─── Init ───────────────────────────────────────── */
    setDisplay('0');
  </script>
</body>
</html>
